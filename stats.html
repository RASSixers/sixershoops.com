<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Sixers Team Stats | SixersHoops</title>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/favicon.ico"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="navbar-styles.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <!-- html2canvas for image generation -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- Google Tag Manager -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T1V9Q0MNEM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T1V9Q0MNEM');
  </script>

  <style>
    :root {
      --color-navy: #001a57;
      --color-navy-dark: #000d2e;
      --color-sky: #006BB6;
      --color-sky-light: #4da8ff;
      --color-cyan: #06b6d4;
      --color-ice: #f5f0e8;
      --color-white: #ffffff;
      --color-slate-900: #0d0d0d;
      --color-slate-800: #1e293b;
      --color-slate-700: #334155;
      --color-slate-500: #64748b;
      --color-gold: #c9a84c;
      --color-sixers-red: #ED174C;
      --card-radius: 24px;
      --card-shadow: 0 20px 50px rgba(10, 23, 78, 0.1);
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', sans-serif;
      background: var(--color-ice);
      color: var(--color-slate-900);
      line-height: 1.6;
      padding-top: 64px;
      overflow-x: hidden;
    }

    /* ── HERO (matches Lottery Simulator) ── */
    .page-header {
      background: var(--color-navy-dark);
      position: relative;
      overflow: hidden;
    }

    .page-header::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,107,182,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,107,182,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .hero-glow-blue {
      position: absolute;
      left: 50%;
      top: -80px;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(0,107,182,0.22) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .hero-glow-red {
      position: absolute;
      left: 50%;
      bottom: -40px;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(237,23,76,0.12) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 4.5rem 2rem 3rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .page-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(3rem, 9vw, 6.5rem);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.95);
      margin: 0;
    }

    .page-title .highlight {
      display: block;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(3rem, 9vw, 6.5rem);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--color-sky), var(--color-sky-light));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 0.2em;
    }

    .hero-divider {
      width: 40px;
      height: 3px;
      background: var(--color-sixers-red);
      border-radius: 2px;
      margin: 1.2rem auto 1rem;
    }

    .page-subtitle {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.38);
      max-width: 420px;
      line-height: 1.65;
      margin: 0;
    }

    .content-wrapper {
      max-width: 1300px;
      margin: 0 auto;
      padding: 0 24px;
      position: relative;
      z-index: 10;
    }

    .stats-container {
      background: #ffffff;
      border-radius: 20px;
      padding: clamp(1.5rem, 5vw, 3.5rem);
      border: 1px solid #e8e4dc;
      box-shadow: 0 4px 20px rgba(0, 26, 87, 0.04);
      margin-bottom: 6rem;
    }

    .stats-section {
      margin-bottom: 5rem;
    }

    .stats-title {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.9rem;
      font-weight: 900;
      color: var(--color-navy);
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .stats-title::before {
      content: "";
      width: 6px;
      height: 36px;
      background: var(--color-sky);
      border-radius: 10px;
    }

    /* Modern Table Styles */
    .table-responsive {
      border-radius: 12px;
      border: 1px solid #e8e4dc;
      overflow-x: auto;
      background: white;
      margin-bottom: 1.5rem;
      -webkit-overflow-scrolling: touch;
    }

    /* Custom Scrollbar */
    .table-responsive::-webkit-scrollbar {
      height: 8px;
    }
    .table-responsive::-webkit-scrollbar-track {
      background: #f0ede6;
      border-radius: 10px;
    }
    .table-responsive::-webkit-scrollbar-thumb {
      background: #c8c4bc;
      border-radius: 10px;
    }
    .table-responsive::-webkit-scrollbar-thumb:hover {
      background: var(--color-sky);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1200px;
      font-family: 'Barlow', sans-serif;
    }

    th {
      background: #f9f7f3;
      color: #4a4a5a;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      padding: 1rem 1rem;
      text-align: left;
      border-bottom: 2px solid #e8e4dc;
      white-space: nowrap;
    }

    th.sortable {
      cursor: pointer;
      position: relative;
      transition: background 0.2s;
    }

    th.sortable:hover {
      background: #f0ede6;
      color: var(--color-sky);
    }

    th.sortable::after {
      content: "\f0d7";
      font-family: "Font Awesome 6 Free";
      font-weight: 900;
      margin-left: 8px;
      opacity: 0.3;
      font-size: 0.7rem;
    }

    th.sortable.desc::after {
      content: "\f0dd";
      opacity: 1;
      color: var(--color-sky);
    }

    th.sortable.asc::after {
      content: "\f0de";
      opacity: 1;
      color: var(--color-sky);
    }

    td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid #f0ede6;
      font-size: 0.88rem;
      font-weight: 700;
      color: var(--color-slate-800);
    }

    tr:hover td {
      background: #faf8f5;
    }

    /* Leader Cards */
    .leaders-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-bottom: 4rem;
    }

    .leader-card {
      background: white;
      border-radius: 12px;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      border: 1px solid #e8e4dc;
      transition: var(--transition);
      position: relative;
    }

    .leader-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0, 26, 87, 0.1);
      border-color: rgba(0, 107, 182, 0.3);
    }

    .leader-card.primary {
      background: white;
      border: 1px solid #e8e4dc;
      border-left: 3px solid var(--color-sky);
    }

    .leader-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--color-navy);
      margin-bottom: 0.25rem;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .leader-pos {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.72rem;
      font-weight: 800;
      color: var(--color-sky);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 1.75rem;
      background: rgba(0,107,182,0.08);
      border: 1px solid rgba(0,107,182,0.2);
      padding: 3px 12px;
      border-radius: 4px;
    }

    .leader-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      padding-top: 1.25rem;
      border-top: 1px solid #f0ede6;
      width: 100%;
    }

    .leader-stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .leader-val {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1.6rem;
      font-weight: 900;
      color: var(--color-navy);
      line-height: 1;
    }

    .leader-unit {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 0.6rem;
      font-weight: 700;
      color: #4a4a5a;
      text-transform: uppercase;
      margin-top: 4px;
      letter-spacing: 0.08em;
    }

    /* Player Cells */
    .player-name-cell {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .player-name {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 800;
      color: var(--color-navy);
      white-space: nowrap;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      font-size: 0.9rem;
    }

    .stat-highlight {
      color: var(--color-sky) !important;
      font-weight: 900 !important;
    }

    /* Export Button */
    .export-container {
      text-align: center;
      margin-top: 4rem;
      padding: 2.5rem;
      background: #f9f7f3;
      border: 1px solid #e8e4dc;
      border-radius: 12px;
    }

    .export-btn {
      background: var(--color-navy);
      padding: 0.9rem 2rem;
      border-radius: 10px;
      font-family: 'Barlow Condensed', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: white;
      border: none;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      transition: var(--transition);
      box-shadow: 0 8px 24px rgba(0, 26, 87, 0.18);
    }

    .export-btn:hover {
      background: var(--color-sky);
      transform: translateY(-2px);
      box-shadow: 0 12px 28px rgba(0, 107, 182, 0.3);
    }

    .export-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .export-modal-content {
      background: #ffffff;
      border-radius: 28px;
      padding: 1.5rem;
      max-width: 700px;
      width: 95%;
      text-align: center;
      max-height: 95vh;
      overflow-y: auto;
    }

    .export-preview {
      display: block;
      margin: 0 auto 1.5rem auto;
      max-width: 100%;
      max-height: 65vh;
      object-fit: contain;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    .modal-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
    }

    .action-btn {
      padding: 0.8rem 2rem;
      border-radius: 12px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      transition: all 0.3s ease;
    }

    .btn-download { background: #059669; color: #fff; }
    .btn-copy { background: var(--color-sky); color: #fff; }
    .btn-close { background: #64748b; color: #fff; }

    /* Loader */
    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--color-sky);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .page-header { padding: 3rem 1rem; }
      .stats-container { padding: 1.5rem; }
      th, td { padding: 0.75rem 0.5rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <section class="page-header">
    <div class="hero-glow-blue"></div>
    <div class="hero-glow-red"></div>
    <div class="hero-inner">
      <p class="page-title">Sixers</p>
      <p class="page-title"><span class="highlight">Stats Central</span></p>
      <div class="hero-divider"></div>
      <p class="page-subtitle">Roster-specific analytics, performance metrics, and team leaders.</p>
    </div>
  </section>

  <div class="content-wrapper">
    <div class="export-container" style="margin-bottom: 3rem; margin-top: 0;">
      <h3 style="margin-bottom: 1.5rem; font-weight: 800; color: var(--color-navy);">Share these stats</h3>
      <button onclick="openExportModal()" class="export-btn">
        <i class="fa-solid fa-camera"></i> Generate Social Graphic
      </button>
    </div>
    <main class="stats-container" id="stats-app">
      <div class="loader">
        <div class="loader-spinner"></div>
        <p>Loading analytics...</p>
      </div>
    </main>
  </div>

  <!-- Export Modal -->
  <div id="export-modal" class="export-modal">
    <div class="export-modal-content">
      <h2 style="margin-bottom: 1rem; color: var(--color-navy);">Your Social Graphic</h2>
      <div id="export-preview-container" style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px;">
        <!-- Canvas/Image will be inserted here -->
        <p>Generating preview...</p>
      </div>

      <div class="modal-actions">
        <button onclick="downloadSocialImage()" class="action-btn btn-download">
          <i class="fa-solid fa-download"></i> Download Image
        </button>
        <button onclick="copySocialImage()" class="action-btn btn-copy">
          <i class="fa-solid fa-copy"></i> Copy to Clipboard
        </button>
        <button onclick="closeExportModal()" class="action-btn btn-close">
          Close
        </button>
      </div>
    </div>
  </div>

  <!-- Hidden container for image generation -->
  <div id="social-export-container" style="position: absolute; left: -9999px; top: -9999px; width: 1200px; background: #f8fafc; padding: 60px; color: #0f172a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 4px solid #003da6; padding-bottom: 30px; margin-bottom: 40px;">
      <div>
        <h1 style="font-size: 56px; font-weight: 900; margin: 0; color: #003da6; letter-spacing: -2px;">SIXERS <span style="color: #e11d48;">ANALYTICS</span></h1>
        <p style="font-size: 24px; color: #475569; font-weight: 700; margin-top: 10px;">Official Season Performance Snapshot</p>
      </div>
      <div style="text-align: right;">
        <div style="font-size: 28px; font-weight: 900; color: #e11d48;">SIXERSHOOPS.COM</div>
      </div>
    </div>

    <div style="display: grid; grid-template-columns: 1.3fr 0.7fr; gap: 40px;">
      <div>
        <div style="background: white; border-radius: 20px; border: 1px solid rgba(15, 23, 42, 0.12); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
          <div style="background: #f1f5f9; padding: 15px 25px; border-bottom: 2px solid rgba(15, 23, 42, 0.08);">
            <h2 style="font-size: 20px; font-weight: 900; color: #003da6; margin: 0; text-transform: uppercase; letter-spacing: 0.05em;">Roster Performance</h2>
          </div>
          <div id="social-leaders" style="padding: 0; display: grid; gap: 0;">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
      
      <div style="display: flex; flex-direction: column; gap: 30px;">
        <div style="background: white; border-radius: 20px; border: 1px solid rgba(15, 23, 42, 0.12); overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.03);">
          <div style="background: #f1f5f9; padding: 15px 25px; border-bottom: 2px solid rgba(15, 23, 42, 0.08);">
            <h2 style="font-size: 20px; font-weight: 900; color: #003da6; margin: 0; text-transform: uppercase; letter-spacing: 0.05em;">Team Averages Per Game</h2>
          </div>
          <div id="social-team-stats" style="padding: 25px;">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="stats.js"></script>
</body>
</html>
