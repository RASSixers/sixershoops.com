<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Philadelphia 76ers Schedule | SixersHoops</title>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/favicon.ico"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="navbar-styles.css"/>

  <!-- Google Tag Manager -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T1V9Q0MNEM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T1V9Q0MNEM');
  </script>

  <style>
    :root {
      --navy: #001a57;
      --navy-deep: #000d2e;
      --sixers-blue: #006BB6;
      --sixers-red: #ED174C;
      --color-navy: #0a174e;
      --color-navy-soft: #122860;
      --color-sky: #3b82f6;
      --color-cyan: #06b6d4;
      --color-ice: #f8fafc;
      --color-white: #ffffff;
      --color-slate-900: #0f172a;
      --color-slate-700: #334155;
      --color-slate-500: #64748b;
      --color-gold: #f59e0b;
      --card-radius: 22px;
      --card-shadow: 0 24px 50px rgba(15, 23, 42, 0.12);
      --border-glow: 1px solid rgba(59, 130, 246, 0.25);
      --blur: blur(18px);
      --transition: all 0.35s ease;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Barlow', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f9fafb;
      color: #111827;
      line-height: 1.6;
      padding-top: 64px;
      margin: 0;
      position: relative;
      overflow-x: hidden;
    }

    /* ── HERO BANNER (matches lottery-simulator) ── */
    .hero {
      background: var(--navy-deep);
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,107,182,0.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,107,182,0.05) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .hero-glow-blue {
      position: absolute;
      left: 50%;
      top: -80px;
      transform: translateX(-50%);
      width: 800px;
      height: 500px;
      background: radial-gradient(ellipse at center, rgba(0,107,182,0.2) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .hero-glow-red {
      position: absolute;
      left: 50%;
      bottom: -40px;
      transform: translateX(-50%);
      width: 500px;
      height: 300px;
      background: radial-gradient(ellipse at center, rgba(237,23,76,0.1) 0%, transparent 65%);
      pointer-events: none;
      z-index: 0;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 4rem 2rem 2.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }

    .hero-title-top {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.95);
      margin: 0;
    }

    .hero-title-bottom {
      font-family: 'Barlow Condensed', sans-serif;
      font-size: clamp(3rem, 8vw, 6rem);
      font-weight: 900;
      line-height: 0.85;
      letter-spacing: -0.01em;
      text-transform: uppercase;
      background: linear-gradient(90deg, var(--sixers-blue), #4da8ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin: 0 0 0.15em;
    }

    .hero-divider {
      width: 40px;
      height: 3px;
      background: var(--sixers-red);
      border-radius: 2px;
      margin: 1.1rem auto 1rem;
    }

    .hero-sub {
      font-size: 0.95rem;
      color: rgba(255,255,255,0.38);
      max-width: 420px;
      line-height: 1.65;
      margin: 0;
      font-family: 'Barlow', sans-serif;
    }

    /* ── SCHEDULE CONTENT ── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .content-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2.5rem 20px;
    }

    .schedule-container {
      background: #ffffff;
      border-radius: 28px;
      box-shadow: 0 24px 45px rgba(15, 23, 42, 0.12);
      padding: clamp(1.5rem, 3vw, 3rem);
      border: 1px solid rgba(226, 232, 240, 0.9);
      margin-bottom: 8rem;
      animation: fadeIn 0.6s ease-out;
    }

    .month-section {
      margin-bottom: 4rem;
    }

    .month-section:last-child {
      margin-bottom: 0;
    }

    .month-title {
      font-size: 1.75rem;
      color: var(--color-navy);
      font-weight: 800;
      margin-bottom: 2rem;
      padding-bottom: 0.75rem;
      border-bottom: 3px solid var(--sixers-blue);
      display: inline-block;
    }

    .table-responsive {
      overflow-x: auto;
      border-radius: 16px;
      border: 1px solid #e2e8f0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.95rem;
    }

    th {
      background: #f8fafc;
      color: var(--color-slate-700);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.75rem;
      letter-spacing: 0.05em;
      padding: 1rem;
      text-align: left;
      border-bottom: 2px solid #e2e8f0;
    }

    td {
      padding: 1rem;
      border-bottom: 1px solid #f1f5f9;
      color: var(--color-slate-900);
      font-weight: 500;
    }

    tr:last-child td {
      border-bottom: none;
    }

    tr:hover td {
      background: #f0f7ff;
    }

    .game-info {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-weight: 700;
    }

    .opponent-logo {
      width: 32px;
      height: 32px;
      object-fit: contain;
    }

    .win-result {
      color: #166534;
      font-weight: 700;
    }

    .loss-result {
      color: #991b1b;
      font-weight: 700;
    }

    .status-badge {
      display: inline-block;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
    }

    .status-upcoming { background: #e0f2fe; color: #0369a1; }
    .status-final { background: #f1f5f9; color: #475569; }
    .status-live { background: #fee2e2; color: #991b1b; animation: pulse 2s infinite; }

    @keyframes pulse {
      0% { opacity: 1; }
      50% { opacity: 0.5; }
      100% { opacity: 1; }
    }

    .loader {
      text-align: center;
      padding: 4rem;
    }

    .loader-spinner {
      border: 4px solid #f3f3f3;
      border-top: 4px solid var(--sixers-blue);
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    @media (max-width: 768px) {
      .hero-inner { padding: 3rem 1.25rem 2rem; }
      .schedule-container { padding: 1rem; }
      th, td { padding: 0.75rem 0.5rem; font-size: 0.85rem; }
    }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <!-- Hero Banner (matches lottery-simulator.html) -->
  <header class="hero">
    <div class="hero-glow-blue"></div>
    <div class="hero-glow-red"></div>
    <div class="hero-inner">
      <p class="hero-title-top">Sixers</p>
      <p class="hero-title-bottom">Schedule</p>
      <div class="hero-divider"></div>
      <p class="hero-sub">2025–26 Season Game Tracker &amp; Results</p>
    </div>
  </header>

  <div class="content-wrapper">
    <main class="schedule-container" id="schedule">
      <div class="loader">
        <div class="loader-spinner"></div>
        <p>Fetching latest schedule...</p>
      </div>
    </main>
  </div>

  <script src="schedule.js"></script>
</body>
</html>
