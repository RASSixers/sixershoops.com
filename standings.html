<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>NBA Standings | SixersHoops</title>
  <link rel="icon" href="/favicon.ico"/>
  <link rel="apple-touch-icon" href="/favicon.ico"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css"/>
  <link rel="stylesheet" href="navbar-styles.css"/>

  <!-- Google Tag Manager -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-T1V9Q0MNEM"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-T1V9Q0MNEM');
  </script>

  <style>
    :root {
      --color-navy: #001a57; --color-navy-dark: #000d2e;
      --color-sky: #006BB6; --color-sky-light: #4da8ff;
      --color-ice: #f5f0e8; --color-white: #ffffff;
      --color-slate-900: #0d0d0d; --color-slate-700: #334155;
      --color-slate-500: #4a4a5a; --color-gold: #c9a84c;
      --sixers-red: #ED174C; --border-light: #e8e4dc;
      --transition: all 0.35s ease;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Barlow', sans-serif;
      background: var(--color-ice);
      color: var(--color-slate-900);
      line-height: 1.6; padding-top: 64px; overflow-x: hidden;
    }
    /* Hero */
    .page-header { background: var(--color-navy-dark); position: relative; overflow: hidden; }
    .page-header::before { content:''; position:absolute; inset:0; background-image: linear-gradient(rgba(0,107,182,0.05) 1px,transparent 1px), linear-gradient(90deg,rgba(0,107,182,0.05) 1px,transparent 1px); background-size:48px 48px; pointer-events:none; z-index:0; }
    .hero-glow-blue { position:absolute; left:50%; top:-80px; transform:translateX(-50%); width:800px; height:500px; background:radial-gradient(ellipse at center,rgba(0,107,182,0.22) 0%,transparent 65%); pointer-events:none; z-index:0; }
    .hero-glow-red { position:absolute; left:50%; bottom:-40px; transform:translateX(-50%); width:500px; height:300px; background:radial-gradient(ellipse at center,rgba(237,23,76,0.12) 0%,transparent 65%); pointer-events:none; z-index:0; }
    .hero-inner { position:relative; z-index:1; max-width:860px; margin:0 auto; padding:4.5rem 2rem 3rem; display:flex; flex-direction:column; align-items:center; text-align:center; }
    .page-title { font-family:'Barlow Condensed',sans-serif; font-size:clamp(3rem,9vw,6.5rem); font-weight:900; line-height:0.85; letter-spacing:-0.01em; text-transform:uppercase; color:rgba(255,255,255,0.95); margin:0; }
    .page-title .highlight { display:block; background:linear-gradient(90deg,var(--color-sky),var(--color-sky-light)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .hero-divider { width:40px; height:3px; background:var(--sixers-red); border-radius:2px; margin:1.2rem auto 1rem; }
    .page-subtitle { font-size:0.95rem; color:rgba(255,255,255,0.38); max-width:420px; line-height:1.65; margin:0; }

    .content-wrapper { max-width:1200px; margin:0 auto; padding:0 20px; }
    .standings-container { background:#fff; border-radius:12px; box-shadow:0 4px 20px rgba(0,26,87,0.05); padding:clamp(1.5rem,3vw,3rem); border:1px solid var(--border-light); margin-bottom:8rem; }
    .conference-section { margin-bottom:4rem; }
    .conference-section:last-child { margin-bottom:0; }
    .conference-title { font-family:'Barlow Condensed',sans-serif; font-size:1.6rem; font-weight:900; letter-spacing:0.04em; text-transform:uppercase; color:var(--color-navy); margin-bottom:2rem; padding-bottom:0.6rem; border-bottom:3px solid var(--color-sky); display:inline-block; }
    .table-responsive { overflow-x:auto; border-radius:12px; border:1px solid var(--border-light); }
    table { width:100%; border-collapse:collapse; font-size:0.9rem; font-family:'Barlow',sans-serif; }
    th { background:#f9f7f3; color:var(--color-slate-500); font-family:'Barlow Condensed',sans-serif; font-weight:700; text-transform:uppercase; font-size:0.68rem; letter-spacing:0.1em; padding:0.9rem 1rem; text-align:left; border-bottom:2px solid var(--border-light); }
    th:last-child, td:last-child { text-align:center; }
    td { padding:0.85rem 1rem; border-bottom:1px solid #f0ede6; color:var(--color-slate-900); font-weight:500; }
    tr:last-child td { border-bottom:none; }
    tr:hover td { background:#faf8f5; }
    .team-info { display:flex; align-items:center; gap:0.75rem; font-family:'Barlow Condensed',sans-serif; font-weight:800; text-transform:uppercase; letter-spacing:0.03em; font-size:0.88rem; }
    .sixers-highlight { background:rgba(0,107,182,0.05) !important; border-left:3px solid var(--color-sky); }
    .rank { color:var(--color-slate-500); font-weight:700; width:30px; display:inline-block; }
    .pct, .gb { font-family:'Barlow Condensed',sans-serif; font-weight:700; }
    .status-badge { display:inline-flex; align-items:center; justify-content:center; padding:0; width:42px; height:22px; border-radius:4px; font-family:'Barlow Condensed',sans-serif; font-size:0.72rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; }
    .streak-w { background:rgba(22,163,74,0.1); color:#15803d; border:1px solid rgba(22,163,74,0.25); }
    .streak-l { background:rgba(220,38,38,0.08); color:#b91c1c; border:1px solid rgba(220,38,38,0.2); }
    .loader { text-align:center; padding:4rem; }
    .loader-spinner { border:4px solid #e8e4dc; border-top:4px solid var(--color-sky); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto 1rem; }
    @keyframes spin { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .export-container { text-align:center; margin-bottom:3rem; background:#f9f7f3; padding:2rem; border-radius:12px; border:1px solid var(--border-light); }
    .export-btns-group { display:flex; justify-content:center; gap:1rem; flex-wrap:wrap; }
    .export-btn { background:var(--color-navy); color:#fff; border:none; padding:0.75rem 1.4rem; border-radius:10px; font-family:'Barlow Condensed',sans-serif; font-size:0.9rem; font-weight:800; letter-spacing:0.08em; text-transform:uppercase; cursor:pointer; transition:var(--transition); display:flex; align-items:center; gap:8px; }
    .export-btn:hover { background:var(--color-sky); transform:translateY(-2px); box-shadow:0 8px 20px rgba(0,107,182,0.25); }
    .export-btn.primary { background:var(--color-sky); }
    .export-btn.primary:hover { background:#0080d4; }
    @media(max-width:768px){ .hero-inner{padding:3rem 1rem 2rem;} .standings-container{padding:1rem;} th,td{padding:0.65rem 0.5rem;font-size:0.8rem;} }

    /* Social Media Export Styling */
    #social-export-container {
      position: fixed;
      left: -9999px;
      top: -9999px;
      width: 1200px;
      background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
      padding: 60px;
      color: #0f172a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    #social-export-container * {
      box-sizing: border-box;
    }
    .social-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
      border-bottom: 5px solid #003da6;
      padding-bottom: 25px;
      width: 100%;
      position: relative;
    }
    .social-title-box {
      flex: 1;
      padding-top: 0;
    }
    .social-title-box h1 {
      font-size: 48px;
      margin: 0 0 10px 0;
      font-weight: 900;
      color: #003da6;
      letter-spacing: -2px;
      line-height: 1;
    }
    .social-title-box p {
      font-size: 18px;
      color: #64748b;
      margin: 0;
      font-weight: 600;
      line-height: 1;
    }
    .social-branding {
      text-align: right;
      flex-shrink: 0;
      position: relative;
      top: 0;
      right: -15px;
    }
    .social-branding .domain {
      font-size: 44px;
      font-weight: 900;
      color: #dc2626;
      line-height: 1;
      margin: 0;
      padding: 0;
    }
    .social-sixers-row td {
      background: #fef3c7 !important;
    }
    .social-content {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 45px;
    }
    .social-conference {
      background: white;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }
    .social-conf-title {
      font-size: 30px;
      font-weight: 900;
      color: #003da6;
      margin-bottom: 28px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    /* Center conference title in single conference mode */
    .social-content.mode-east .social-conf-title,
    .social-content.mode-west .social-conf-title {
      text-align: center;
    }
    .social-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }
    .social-table th {
      background: #f1f5f9;
      padding: 15px 12px;
      font-size: 11px;
      text-transform: uppercase;
      color: #64748b;
      font-weight: 800;
      letter-spacing: 0.5px;
      border-bottom: 2px solid #e2e8f0;
      text-align: center;
    }
    .social-table th:first-child {
      border-radius: 10px 0 0 0;
      text-align: left;
    }
    .social-table th:nth-child(2) {
      text-align: center;
    }
    .social-table th:nth-child(3) {
      text-align: center;
    }
    .social-table th:last-child {
      border-radius: 0 10px 0 0;
      text-align: center;
    }
    .social-table td {
      padding: 0;
      font-size: 15px;
      font-weight: 600;
      border-bottom: 1px solid #f1f5f9;
      background: white;
      height: 50px;
    }
    .social-table td .cell-content {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 50px;
      padding: 0 12px;
    }
    .social-table td:first-child .cell-content {
      justify-content: flex-start;
    }
    .social-table tr:last-child td:first-child {
      border-radius: 0 0 0 10px;
    }
    .social-table tr:last-child td:last-child {
      border-radius: 0 0 10px 0;
    }
    .social-table tr:last-child td {
      border-bottom: none;
    }
    .social-team {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .social-team-rank {
      min-width: 24px;
      font-size: 13px;
      color: #94a3b8;
      font-weight: 700;
      text-align: center;
    }
    .social-team-name {
      font-weight: 700;
      color: #0f172a;
    }
    .social-streak-badge {
      font-size: 13px;
      font-weight: 900;
      text-transform: uppercase;
    }
    .social-streak-w {
      color: #16a34a;
    }
    .social-streak-l {
      color: #dc2626;
    }
    .social-footer {
      margin-top: 45px;
      text-align: center;
      font-size: 18px;
      color: #64748b;
      font-weight: 700;
    }

    .social-content.mode-east, .social-content.mode-west {
      grid-template-columns: 1fr;
      max-width: 920px;
      margin: 0 auto;
    }
    .social-content.mode-east .social-conference,
    .social-content.mode-west .social-conference {
      padding: 40px;
    }
    
    /* Single Conference Mode Header */
    .social-header.single-conf-mode {
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding-bottom: 30px;
    }
    .social-header.single-conf-mode .social-title-box {
      width: 100%;
      margin-bottom: 18px;
    }
    .social-header.single-conf-mode .social-title-box h1 {
      font-size: 52px;
      margin-bottom: 28px;
    }
    .social-header.single-conf-mode .social-title-box p {
      font-size: 22px;
      color: #003da6;
      margin-bottom: 0;
    }
    .social-header.single-conf-mode .social-branding {
      position: static;
      text-align: center;
      margin-top: 0;
      right: 0;
    }
    .social-header.single-conf-mode .social-branding .domain {
      font-size: 36px;
    }

    /* Export Button & Modal */
    .export-container {
      text-align: center;
      margin-bottom: 3rem;
      background: #ffffff;
      padding: 2rem;
      border-radius: 20px;
      border: 1px solid #e2e8f0;
    }
    .export-btns-group {
      display: flex;
      justify-content: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .export-btn {
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: #fff;
      border: none;
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .export-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15);
    }
    .export-btn.primary {
      background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
    }
    .export-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }
    .export-modal-content {
      background: #ffffff;
      border-radius: 24px;
      padding: 2rem;
      max-width: 95vw;
      width: auto;
      max-height: 95vh;
      overflow-y: auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .export-preview {
      max-width: 100%;
      max-height: calc(95vh - 200px);
      width: auto;
      height: auto;
      border-radius: 12px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.2);
      margin-bottom: 1.5rem;
      object-fit: contain;
    }
    .export-actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
    }
    .copy-btn, .download-btn, .close-btn {
      padding: 0.8rem 1.5rem;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .copy-btn { background: #3b82f6; color: #fff; }
    .download-btn { background: #059669; color: #fff; }
    .close-btn { background: #64748b; color: #fff; }
  </style>
</head>
<body>
  <script src="nav.js"></script>

  <section class="page-header">
    <div class="hero-glow-blue"></div>
    <div class="hero-glow-red"></div>
    <div class="hero-inner">
      <p class="page-title">NBA</p>
      <p class="page-title"><span class="highlight">Standings</span></p>
      <div class="hero-divider"></div>
      <p class="page-subtitle">Real-time Eastern & Western Conference Rankings</p>
    </div>
  </section>

  <div class="content-wrapper">
    <div class="export-container">
      <h3 style="margin-bottom: 1.2rem; color: var(--color-navy); font-size: 1.1rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 800;">Standings Graphics</h3>
      <div class="export-btns-group">
        <button class="export-btn primary" data-export-mode="both">📸 Full League</button>
        <button class="export-btn" data-export-mode="east">📸 Eastern Conference</button>
        <button class="export-btn" data-export-mode="west">📸 Western Conference</button>
      </div>
    </div>

    <main class="standings-container" id="standings">
      <div class="loader">
        <div class="loader-spinner"></div>
        <p>Fetching latest standings...</p>
      </div>
    </main>
  </div>

  <!-- Social Media Export Hidden Container -->
  <div id="social-export-container">
    <div class="social-header">
      <div class="social-title-box">
        <h1>NBA Standings</h1>
        <p id="export-date">2025-26 Season</p>
      </div>
      <div class="social-branding">
        <div class="domain">SixersHoops.com</div>
      </div>
    </div>
    <div class="social-content" id="social-export-content">
      <!-- Populated by JS -->
    </div>
    <div class="social-footer">
      Real-time updates & analysis at SixersHoops.com
    </div>
  </div>

  <!-- Export Modal -->
  <div id="exportModal" class="export-modal">
    <div class="export-modal-content">
      <img id="exportPreview" class="export-preview" alt="Standings export">
      <div class="export-actions">
        <button class="download-btn" id="downloadBtn">Download Image</button>
        <button class="copy-btn" id="copyBtn">Copy to Clipboard</button>
        <button class="close-btn" id="closeModal">Close</button>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="standings.js"></script>
</body>
</html>
