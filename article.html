<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sixers Hoops</title>
    <meta name="description" content="Sixers Hoops — player grades, analysis, and editorial coverage.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/navbar-styles.css">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8046070602394287" crossorigin="anonymous"></script>
    <style>
        :root { --navy:#001a57;--navy-deep:#000d2e;--sixers-blue:#006BB6;--sixers-red:#ED174C;--cream:#f5f0e8;--ink:#0d0d0d;--mid:#4a4a5a;--border-light:#e8e4dc;--card-bg:#ffffff; }
        *,*::before,*::after{box-sizing:border-box}
        body,html{font-family:'Barlow',sans-serif;margin-top:64px;background:var(--cream);color:var(--ink)}

        .art-hero { background:var(--navy-deep);padding:4rem 1.5rem 3rem;position:relative;overflow:hidden;text-align:center; }
        .art-hero::before { content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(0,107,182,0.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,107,182,0.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none; }
        .art-hero-inner { max-width:860px;margin:0 auto;position:relative;z-index:1; }
        .art-cat-badge { display:inline-block;font-family:'Barlow Condensed',sans-serif;font-size:0.7rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;padding:5px 14px;border-radius:6px;margin-bottom:1.5rem; }
        .art-headline { font-family:'Barlow Condensed',sans-serif;font-size:clamp(2.4rem,6vw,4rem);font-weight:900;line-height:1.0;color:#ffffff;margin:0 0 1.5rem;text-transform:uppercase;letter-spacing:-0.01em; }
        .art-byline { font-size:0.82rem;color:rgba(255,255,255,0.4);display:flex;align-items:center;justify-content:center;gap:1.25rem;flex-wrap:wrap; }
        .art-byline-item { display:flex;align-items:center;gap:0.35rem; }

        .art-body-wrap { max-width:760px;margin:2.5rem auto;padding:0 1.5rem 4rem; }
        .art-body p { font-size:1rem;line-height:1.8;color:var(--ink);margin:0 0 1.4rem; }
        .art-body h2 { font-family:'Barlow Condensed',sans-serif;font-size:1.4rem;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink);margin:2.5rem 0 0.75rem;padding-left:0.75rem;border-left:3px solid var(--sixers-red); }

        .art-grade-card { background:var(--card-bg);border:1px solid var(--border-light);border-radius:14px;padding:1.25rem 1.4rem;margin:1rem 0; }
        .art-grade-header { display:flex;align-items:center;justify-content:space-between;gap:1rem;margin-bottom:0.6rem; }
        .art-grade-name { font-family:'Barlow Condensed',sans-serif;font-size:1.25rem;font-weight:900;text-transform:uppercase;color:var(--ink); }
        .art-grade-badge { font-family:'Barlow Condensed',sans-serif;font-size:1rem;font-weight:900;color:white;padding:4px 14px;border-radius:8px;flex-shrink:0; }
        .art-grade-stats { font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em;color:var(--mid);padding-bottom:0.6rem;border-bottom:1px dashed var(--border-light);margin-bottom:0.6rem; }
        .art-grade-analysis { font-size:0.92rem;line-height:1.65;color:#475569; }

        .art-back { display:inline-flex;align-items:center;gap:0.5rem;font-family:'Barlow Condensed',sans-serif;font-size:0.78rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--sixers-blue);text-decoration:none;margin-bottom:1.5rem; }
        .art-back:hover { opacity:0.75; }

        @keyframes sk{0%,100%{opacity:1}50%{opacity:0.45}}
        .sk { background:#e2e8f0;border-radius:4px;animation:sk 1.4s ease-in-out infinite; }

        footer { background:var(--navy-deep);color:rgba(255,255,255,0.5);font-size:0.8rem;padding:2rem 1.5rem;text-align:center;margin-top:0; }
        footer a { color:rgba(255,255,255,0.6);text-decoration:none;margin:0 0.75rem; }

        :root.dark-mode { --cream:#111318;--ink:#f0f0f5;--mid:#8888a0;--border-light:#1e2130;--card-bg:#171b26; }
        :root.dark-mode body { background:var(--cream);color:var(--ink); }
        :root.dark-mode .art-grade-card { background:var(--card-bg);border-color:var(--border-light); }
        :root.dark-mode .art-grade-name,:root.dark-mode .art-body p,:root.dark-mode .art-body h2 { color:var(--ink); }
    </style>
</head>
<body>

<!-- Hero (filled by JS) -->
<div class="art-hero" id="art-hero">
    <div class="art-hero-inner">
        <div class="sk" style="width:90px;height:22px;margin:0 auto 1.5rem;border-radius:6px;"></div>
        <div class="sk" style="width:75%;height:48px;margin:0 auto 0.6rem;"></div>
        <div class="sk" style="width:55%;height:48px;margin:0 auto 1.5rem;"></div>
        <div class="sk" style="width:240px;height:14px;margin:0 auto;border-radius:10px;"></div>
    </div>
</div>

<!-- Body -->
<div class="art-body-wrap">
    <a href="/" class="art-back">
        <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
        Back to Sixers Hoops
    </a>
    <div class="art-body" id="art-body">
        <div class="sk" style="width:100%;height:14px;margin-bottom:10px;"></div>
        <div class="sk" style="width:90%;height:14px;margin-bottom:10px;"></div>
        <div class="sk" style="width:80%;height:14px;margin-bottom:10px;"></div>
        <div class="sk" style="width:65%;height:14px;margin-bottom:2rem;"></div>
        <div class="art-grade-card" style="opacity:0.4;">
            <div class="art-grade-header">
                <div class="sk" style="width:160px;height:22px;"></div>
                <div class="sk" style="width:50px;height:30px;border-radius:8px;"></div>
            </div>
            <div class="sk" style="width:100%;height:12px;margin-bottom:8px;"></div>
            <div class="sk" style="width:85%;height:12px;"></div>
        </div>
    </div>
</div>

<footer>
    <div style="margin-bottom:0.75rem;">
        <a href="/">Home</a><a href="/about.html">About</a>
        <a href="/contact.html">Contact</a><a href="/privacy-policy.html">Privacy Policy</a>
        <a href="/terms-of-service.html">Terms of Service</a>
    </div>
    <p style="margin:0;">&copy; 2025 Sixers Hoops. Not affiliated with the Philadelphia 76ers or the NBA.</p>
</footer>

<script src="/nav.js"></script>
<script>
const GRADE_COLORS = {'A+':'#1a6b3c','A':'#1e7d46','A-':'#2d8f56','B+':'#006BB6','B':'#0077cc','B-':'#2a85d0','C+':'#b06b00','C':'#c27800','D+':'#b83232','D':'#a02828','F':'#7a1a1a'};
const CAT_COLORS = {'Player Grades':'#1e7d46','Analysis':'#006BB6','Opinion':'#b06b00','Preview':'#ED174C','Recap':'#475569','News':'#0077cc'};

function renderArticle(a) {
    const color = CAT_COLORS[a.category] || '#006BB6';
    const gradient = a.gradient || '';
    const date = a.createdAt
        ? (a.createdAt.toDate ? a.createdAt.toDate() : new Date(a.createdAt))
            .toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'})
        : '';

    // Update page title & meta
    document.title = a.title + ' | Sixers Hoops';
    document.querySelector('meta[name="description"]').content = a.excerpt || a.title;

    // Hero
    const hero = document.getElementById('art-hero');
    if (gradient) {
        const ov = document.createElement('div');
        ov.style.cssText = 'position:absolute;inset:0;background:' + gradient + ';opacity:0.35;pointer-events:none;';
        hero.insertBefore(ov, hero.firstChild);
    }

    const wordCount = [(a.intro||''),(a.closing||''),...(a.grades||[]).map(g=>g.analysis||'')].join(' ').split(/\s+/).filter(Boolean).length;
    const mins = Math.max(1, Math.round(wordCount / 200));

    hero.innerHTML = (gradient ? hero.innerHTML : '') + `
        <div class="art-hero-inner">
            <div class="art-cat-badge" style="background:${color}28;color:${color};border:1px solid ${color}50;">${a.category}</div>
            <h1 class="art-headline">${a.title}</h1>
            <div class="art-byline">
                <span class="art-byline-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                    Sixers Hoops Staff
                </span>
                <span class="art-byline-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect width="18" height="18" x="3" y="4" rx="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
                    ${date}
                </span>
                <span class="art-byline-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg>
                    ${mins} min read
                </span>
            </div>
        </div>`;

    // Body
    let html = '';
    if (a.intro) html += '<p>' + a.intro + '</p>';

    const visible = (a.grades||[]).filter(g => g.grade !== 'DNP');
    if (visible.length > 0) {
        html += '<h2>Player Grades</h2>';
        visible.forEach(g => {
            const gc = GRADE_COLORS[g.grade] || '#475569';
            html += '<div class="art-grade-card">'
                + '<div class="art-grade-header"><span class="art-grade-name">' + g.name + '</span><span class="art-grade-badge" style="background:' + gc + ';">' + g.grade + '</span></div>'
                + (g.stats ? '<div class="art-grade-stats">' + g.stats + '</div>' : '')
                + (g.analysis ? '<div class="art-grade-analysis">' + g.analysis + '</div>' : '')
                + '</div>';
        });
    }

    if (a.closing) html += '<h2>Bottom Line</h2><p>' + a.closing + '</p>';
    document.getElementById('art-body').innerHTML = html || '<p>Article content coming soon.</p>';
}

function load(tries = 0) {
    const id = new URLSearchParams(window.location.search).get('id');
    if (!id) {
        document.getElementById('art-body').innerHTML = '<p>No article specified. <a href="/">Go back home →</a></p>';
        return;
    }
    if (!window.db) {
        if (tries < 40) setTimeout(() => load(tries + 1), 250);
        return;
    }
    window.db.collection('editorial_articles').doc(id).get()
        .then(doc => {
            if (!doc.exists) {
                document.getElementById('art-body').innerHTML = '<p>Article not found. <a href="/">Go back home →</a></p>';
                return;
            }
            renderArticle({ id: doc.id, ...doc.data() });
        })
        .catch(() => {
            document.getElementById('art-body').innerHTML = '<p>Error loading article. <a href="/">Go back home →</a></p>';
        });
}

document.addEventListener('DOMContentLoaded', () => load());
</script>
</body>
</html>
